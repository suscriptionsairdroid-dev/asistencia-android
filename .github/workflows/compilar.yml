name: Compilar APK Asistencia Android

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el código
      uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Configurar Gradle Específico
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Generar Reporte de Firmas (SHA-1)
      # Este paso nos dirá la "llave" que debemos pegar en Firebase
      run: ./gradlew signingReport || true

    - name: Compilar el APK (Debug)
      run: gradle assembleDebug --no-daemon

    - name: Subir el APK para descargar
      uses: actions/upload-artifact@v4
      with:
        name: Asistencia-Android-APK
        path: app/build/outputs/apk/debug/*.apk